<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DDing – Safety Awareness Tool</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<header class="top-bar">
  <div class="logo">
    <!-- 눈 모양 아이콘 -->
    <svg
      class="logo-icon"
      width="32"
      height="32"
      viewBox="0 0 100 100"
      aria-hidden="true"
    >
      <circle
        cx="50"
        cy="50"
        r="42"
        stroke="#ff7a1a"
        stroke-width="6"
        fill="none"
      />
      <circle cx="50" cy="50" r="6" fill="#ff7a1a" />
      <path
        d="M50 10 Q90 50 50 90 Q10 50 50 10 Z"
        stroke="#ff7a1a"
        stroke-width="4"
        fill="none"
      />
    </svg>

    <!-- 텍스트 로고 -->
    <span class="logo-text">DDing</span>
  </div>

  <nav class="nav">
    ...
  </nav>
</header>


  <main class="layout">
    <!-- 왼쪽: 상태/레이더 -->
    <section class="panel system-panel">
      <div class="panel-header">
        <span class="panel-title">SYSTEM STANDBY</span>
        <span class="badge badge-strong">VIBRATION: STRONG</span>
      </div>

      <div class="radar-wrapper">
        <div class="radar-circle outer"></div>
        <div class="radar-circle middle"></div>
        <div class="radar-circle inner"></div>
        <div class="radar-center">RADAR OFFLINE</div>
      </div>

      <button id="startButton" class="start-btn">
        START
      </button>

      <p class="helper-text">
        감지를 시작하려면 버튼을 누르세요
      </p>
      <p class="sub-helper">
        안전한 보행을 돕는 예비 신호 도구
      </p>
    </section>

    <!-- 오른쪽: 설명 -->
    <section class="panel info-panel">
      <h1 class="title">Stay aware with DDing</h1>
      <p class="desc">
        화면을 볼 때 주변 위험을 **햅틱 알림**으로 알려주는 시각 안전 인지 도구입니다.
      </p>
      <p class="status">Status: <span id="statusText">Detection OFF</span></p>
      <p class="footer-copy">© 2026 DDing</p>
    </section>
  </main>
<script src="script.js"></script>
</body>
</html>
