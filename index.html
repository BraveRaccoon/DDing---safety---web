<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DDing – Safety Awareness Tool</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="app-header">
  <h1 class="logo">DDing</h1>
  <p class="subtitle">Visual Safety Awareness Tool</p>
</header>

<nav class="nav">
  <a class="active">HOME</a>
  <a href="guide.html">GUIDE</a>
</nav>

<main class="main-area">

  <section class="status">
    <p class="status-label">Status</p>
    <p class="status-value" id="statusText">Detection OFF</p>
  </section>

  <button class="detect-button" id="detectButton">
    🎙 Start Detection
  </button>

  <section class="alert hidden" id="alertBox">
    <p class="alert-text">LOOK AROUND</p>
    <p class="alert-subtext">
      Potential danger detected.<br />
      Please check your surroundings.
    </p>
  </section>

</main>

<footer class="app-footer">
  DDing provides haptic alerts to support visual awareness.<br />
  This is a web-based prototype.
</footer>

<script src="script.js"></script>
</body>
</html>

<header class="app-header horizontal">
  <div class="logo-wrapper">
    <!-- 로고 아이콘 -->
    <svg class="logo-icon" width="48" height="48" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="42" stroke="#ff6b00" stroke-width="6" fill="none"/>
      <circle cx="50" cy="50" r="6" fill="#ff6b00"/>
      <path d="M50 10 Q90 50 50 90 Q10 50 50 10 Z"
            stroke="#ff6b00" stroke-width="4" fill="none"/>
    </svg>

    <!-- 텍스트 로고 -->
    <div class="logo-text-group">
      <h1 class="logo-text">
        <span class="accent">DD</span>ing
      </h1>
      <p class="subtitle">Visual Safety Awareness Tool</p>
    </div>
  </div>
</header>
