<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History – DDing</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="top-bar">
    <div class="logo">
      <svg class="logo-icon" width="32" height="32" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="42" stroke="#ff7a1a" stroke-width="6" fill="none"/>
        <circle cx="50" cy="50" r="6" fill="#ff7a1a"/>
        <path d="M50 10 Q90 50 50 90 Q10 50 50 10 Z" stroke="#ff7a1a" stroke-width="4" fill="none"/>
      </svg>
      <span class="logo-text">DDing</span>
    </div>
    <nav class="nav">
      <a href="index.html" class="nav-item">HOME</a>
      <a href="history.html" class="nav-item active">HISTORY</a>
      <a href="guide.html" class="nav-item">GUIDE</a>
    </nav>
  </header>

  <main class="layout">
    <!-- 왼쪽: 로그 리스트 -->
    <section class="panel log-panel">
      <div class="panel-header">
        <span class="panel-title">Detection Logs</span>
        <span class="badge">최근 7일</span>
      </div>

      <div class="log-item">
        <div class="log-time">10:42 AM</div>
        <div class="log-status active">🚶 위험 감지</div>
      </div>

      <div class="log-item">
        <div class="log-time">09:15 AM</div>
        <div class="log-status">📱 화면 주의</div>
      </div>

      <div class="log-item">
        <div class="log-time">08:30 AM</div>
        <div class="log-status active">🚨 긴급 알림</div>
      </div>
    </section>

    <!-- 오른쪽: 통계 -->
    <section class="panel info-panel">
      <h1 class="title">Detection History</h1>
      <p class="desc">
        지난 감지 기록을 확인하세요. 총 <strong>23건</strong>의 위험을 감지했습니다.
      </p>
      <div class="stats-grid">
        <div class="stat-item">
          <span class="stat-number">15</span>
          <span class="stat-label">위험 감지</span>
        </div>
        <div class="stat-item">
          <span class="stat-number">8</span>
          <span class="stat-label">주의 알림</span>
        </div>
      </div>
      <p class="footer-copy">© 2026 DDing</p>
    </section>
  </main>
</body>
</html>
