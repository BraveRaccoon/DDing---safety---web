<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guide – DDing</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="top-bar">
    <div class="logo">
      <svg class="logo-icon" width="32" height="32" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="42" stroke="#ff7a1a" stroke-width="6" fill="none"/>
        <circle cx="50" cy="50" r="6" fill="#ff7a1a"/>
        <path d="M50 10 Q90 50 50 90 Q10 50 50 10 Z" stroke="#ff7a1a" stroke-width="4" fill="none"/>
      </svg>
      <span class="logo-text">DDing</span>
    </div>
    <nav class="nav">
      <a href="index.html" class="nav-item">HOME</a>
      <a href="#history" class="nav-item">HISTORY</a>
      <a href="guide.html" class="nav-item active">GUIDE</a>
    </nav>
  </header>

  <main class="layout">
    <!-- 왼쪽: 가이드 카드들 -->
    <section class="panel guide-panel">
      <div class="guide-header">
        <h2 class="guide-title">Safety Guide</h2>
        <span class="guide-badge">안전 가이드</span>
      </div>

      <div class="guide-card">
        <div class="guide-icon">📱</div>
        <h3>앱 사용법</h3>
        <p>DDing을 통해 주변 위험을 햅틱 알림으로 받으세요. 화면을 볼 때도 안전하게!</p>
      </div>

      <div class="guide-card">
        <div class="guide-icon">⚠️</div>
        <h3>위험 감지</h3>
        <p>센서로 주변 장애물을 실시간 감지합니다.</p>
      </div>

      <div class="guide-card">
        <div class="guide-icon">📊</div>
        <h3>로그 확인</h3>
        <p>HISTORY 탭에서 감지 기록을 확인하세요.</p>
      </div>
    </section>

    <!-- 오른쪽: 설명 -->
    <section class="panel info-panel">
      <h1 class="title">사용 가이드</h1>
      <p class="desc">
        DDing은 여러분을 위한 보행 안전 도우미입니다.<br>
        화면과 진동으로 주변 위험을 알려드리겠습니다.
      </p>
      <div class="quick-tips">
        <div class="tip-item">
          <span class="tip-icon">1</span>
          <span>START 버튼으로 감지 시작</span>
        </div>
        <div class="tip-item">
          <span class="tip-icon">2</span>
          <span>HISTORY에서 기록 확인</span>
        </div>
      </div>
      <p class="footer-copy">© 2026 DDing</p>
    </section>
  </main>
</body>
</html>
